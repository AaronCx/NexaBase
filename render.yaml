services:
  - type: web
    name: nexabase-api
    runtime: python
    repo: https://github.com/AaronCx/NexaBase.git
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: APP_NAME
        value: NexaBase
      - key: DEBUG
        value: "false"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: FREE_TIER_MONTHLY_MESSAGES
        value: "50"
      - key: PRO_TIER_MONTHLY_MESSAGES
        value: "5000"
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_FREE_PRICE_ID
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://nexabase.vercel.app","http://localhost:3000"]'
    healthCheckPath: /health
    plan: free
